version: "3.9"

services:

  # FastAPI RAG Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multimodal_rag_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      FAISS_INDEX_PATH: /app/data/faiss_index
      TRANSFORMERS_CACHE: /app/model_cache
      HF_HOME: /app/model_cache
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - ./raw_dataset/faiss_index:/app/data/faiss_index
      - model_cache:/app/model_cache
      - ./raw_dataset/data:/app/raw_dataset:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - rag_net
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4.0"

  redis:
    image: redis:7.2-alpine   
    container_name: multimodal_rag_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag_net

  postgres:
    image: postgres:16-alpine
    container_name: multimodal_rag_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgre_init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag_net

  nginx:
    image: nginx:1.27-alpine
    container_name: multimodal_rag_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - rag_net

volumes:
  model_cache:
  redis_data:
  postgres_data:

networks:
  rag_net:
    driver: bridge